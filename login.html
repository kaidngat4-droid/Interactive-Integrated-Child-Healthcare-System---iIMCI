<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="نظام الرعاية التكاملية التفاعلي لصحة الطفل - iIMCI">
    <meta name="author" content="D / Salah Al-ahdel">
    <meta name="theme-color" content="#1e3a8a">
    <title>تسجيل الدخول | iIMCI Digital System</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;700&family=Syne:wght@400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@200;300;400;500;700;800;900&family=Changa:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --accent-color: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.96);
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .bg-shapes { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        .bg-shapes .shape { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.03); animation: float 20s infinite ease-in-out; }
        .bg-shapes .shape:nth-child(1) { width: 400px; height: 400px; top: -200px; right: -100px; }
        .bg-shapes .shape:nth-child(2) { width: 300px; height: 300px; bottom: -150px; left: -100px; animation-delay: 5s; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        .login-container {
            width: 90%;
            max-width: 440px;
            background: var(--glass-bg);
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-section img { width: 80px; margin-bottom: 12px; }
        .ministry-title { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .system-title { font-size: 18px; font-weight: 900; color: var(--primary-color); margin-bottom: 5px; }
        .system-subtitle-en { font-size: 10px; color: var(--text-muted); margin-bottom: 25px; }
        
        .input-group { margin-bottom: 18px; text-align: right; }
        .input-group label { font-size: 13px; color: var(--primary-color); font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .input-wrapper { position: relative; }
        .input-group input { width: 100%; padding: 13px 16px; border-radius: 12px; border: 2px solid #e2e8f0; background: #f8fafc; font-family: 'Cairo', sans-serif; font-size: 14px; transition: 0.2s; }
        .input-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(30,58,138,0.1); }
        
        .password-toggle { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); }

        .login-btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: #fff;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.4s;
            font-family: 'Cairo', sans-serif;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,58,138,0.3); }

        .error-message, .success-message { font-size: 13px; margin-top: 15px; padding: 10px; border-radius: 8px; display: none; align-items: center; justify-content: center; gap: 5px; }
        .error-message { color: var(--error-color); background: #fee2e2; }
        .success-message { color: var(--success-color); background: #d1fae5; }

        .dev-signature-pro { margin-top: 25px; padding-top: 18px; border-top: 1px solid #f1f5f9; }
        .dev-name { font-size: 14px; font-weight: 800; color: #ef4444; }
        .dev-text { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
        .global-icon { color: var(--primary-color); margin-left: 4px; }
    </style>
</head>
<body>

    <div class="bg-shapes"><div class="shape"></div><div class="shape"></div></div>

    <div class="login-container">
        <div class="logo-section">
            <img src="assets/images/yemen-eagle.png" onerror="this.src='https://flagcdn.com/w160/ye.png';" alt="Logo">
        </div>

        <div class="ministry-title">
            الجمهورية اليمنية<br>
            وزارة الصحة والبيئة<br>
            قطاع الرعاية الصحية الأولية 
        </div>

        <div class="system-title">نظام الرعاية التكاملية التفاعلي لصحة الطفل</div>
        <div class="system-subtitle-en">Interactive Integrated Child Healthcare System - iIMCI</div>

        <div class="input-group">
            <label><i class="fa-solid fa-user-circle"></i> اسم المستخدم</label>
            <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        </div>

        <div class="input-group">
            <label><i class="fa-solid fa-key"></i> كلمة المرور</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="••••••••">
                <span class="password-toggle" onclick="togglePass()"><i class="fa-solid fa-eye" id="eyeIcon"></i></span>
            </div>
        </div>

        <button class="login-btn" onclick="login()" id="loginBtn">تسجيل الدخول الآمن</button>

        <div class="error-message" id="errorMsg"><i class="fa-solid fa-circle-exclamation"></i> <span id="errorText"></span></div>
        <div class="success-message" id="successMsg"><i class="fa-solid fa-check-circle"></i> <span id="successText"></span></div>

        <div class="dev-signature-pro">
            <div class="dev-text">
                <i class="fa-solid fa-globe global-icon"></i> هندسة وتطوير بواسطة
            </div>
            <span class="dev-name">Dr / Salah Al-ahdel</span>
        </div>
    </div>

    <script>
        // ============================================================
        // المستخدمون الأصليون - لم يتم تغييرهم
        // ============================================================
        const users = {
            "imci_rayas": { pass: "123456", facility: "المركز الصحي الرياس" },
            "imci_maliky": { pass: "123456", facility: "المركز الصحي بلاد المليكي" },
            "imci_gabalin": { pass: "123456", facility: "المركز الصحي الجبلين" }
        };

        // ============================================================
        // نظام الصلاحيات RBAC - إضافة جديدة
        // ============================================================
        const ROLES = {
            ADMIN: 'admin',
            DOCTOR: 'doctor',
            NURSE: 'nurse',
            DATA_ENTRY: 'data_entry',
            SUPERVISOR: 'supervisor'
        };

        const ROLE_LABELS = {
            admin: 'مدير النظام',
            doctor: 'طبيب',
            nurse: 'ممرض/ة',
            data_entry: 'مُدخل بيانات',
            supervisor: 'مشرف صحي'
        };

        // المستخدمون الافتراضيون للنظام الجديد (إذا لم يكنوا موجودين)
        const DEFAULT_USERS = [
            { id: "admin_001", username: "admin", password: "admin123", fullName: "مدير النظام", role: "admin", facility: "all", isActive: true, createdAt: "2026-05-15" },
            { id: "doc_001", username: "dr.salah", password: "doc123", fullName: "د. صلاح الأحصل", role: "doctor", facility: "المركز الصحي الرياس", isActive: true, createdAt: "2026-05-15" },
            { id: "nurse_001", username: "nurse.fatima", password: "nurse123", fullName: "فاطمة علي - ممرضة", role: "nurse", facility: "المركز الصحي بلاد المليكي", isActive: true, createdAt: "2026-05-15" },
            { id: "entry_001", username: "data.ahmed", password: "entry123", fullName: "أحمد محمد - مُدخل بيانات", role: "data_entry", facility: "المركز الصحي الجبلين", isActive: true, createdAt: "2026-05-15" },
            { id: "super_001", username: "super.khaled", password: "super123", fullName: "خالد سعيد - مشرف صحي", role: "supervisor", facility: "all", isActive: true, createdAt: "2026-05-15" }
        ];

        const DEFAULT_FACILITIES = [
            "المركز الصحي الرياس",
            "المركز الصحي بلاد المليكي",
            "المركز الصحي الجبلين",
            "مركز الصحة الأولية - إب",
            "مركز الصحة الأولية - تعز",
            "مركز الصحة الأولية - صنعاء",
            "مركز الصحة الأولية - عدن"
        ];

        // تهيئة البيانات
        function initData() {
            if (!localStorage.getItem('imci_users')) {
                localStorage.setItem('imci_users', JSON.stringify(DEFAULT_USERS));
            }
            if (!localStorage.getItem('imci_facilities')) {
                localStorage.setItem('imci_facilities', JSON.stringify(DEFAULT_FACILITIES));
            }
        }

        function togglePass() {
            const passInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eyeIcon");
            if(passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passInput.type = "password";
                eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // ============================================================
        // دالة تسجيل الدخول المحدثة - تدعم المستخدمين القدامى والجدد
        // ============================================================
        function login() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorBox = document.getElementById("errorMsg");
            const successBox = document.getElementById("successMsg");

            initData();

            // الخطوة 1: التحقق من المستخدمين الأصليين (imci_rayas, imci_maliky, imci_gabalin)
            if(users[user] && users[user].pass === pass) {
                // تسجيل الدخول بالنظام القديم
                localStorage.setItem("imci_logged_in", "true");
                localStorage.setItem("imci_user", user);
                localStorage.setItem("imci_facility", users[user].facility);
                
                // إنشاء جلسة RBAC للمستخدم الأصلي (يعامل كـ admin افتراضياً)
                const session = {
                    id: 'legacy_' + user,
                    username: user,
                    fullName: users[user].facility + " - مدير",
                    role: "admin",
                    facility: users[user].facility,
                    loginTime: new Date().toISOString(),
                    isLegacy: true
                };
                localStorage.setItem('imci_session', JSON.stringify(session));
                
                successBox.style.display = "flex";
                document.getElementById("successText").textContent = "تم الدخول بنجاح - " + users[user].facility;
                errorBox.style.display = "none";
                
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                return;
            }

            // الخطوة 2: التحقق من المستخدمين الجدد (نظام RBAC)
            const allUsers = JSON.parse(localStorage.getItem('imci_users')) || [];
            const rbacUser = allUsers.find(u => 
                u.username === user && 
                u.password === pass && 
                u.isActive === true
            );

            if(rbacUser) {
                const session = {
                    id: rbacUser.id,
                    username: rbacUser.username,
                    fullName: rbacUser.fullName,
                    role: rbacUser.role,
                    facility: rbacUser.facility,
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('imci_session', JSON.stringify(session));
                localStorage.setItem('imci_logged_in', 'true');
                localStorage.setItem('imci_facility', rbacUser.facility === 'all' ? (DEFAULT_FACILITIES[0] || 'مركز غير معروف') : rbacUser.facility);
                localStorage.setItem('imci_user', rbacUser.username);
                
                successBox.style.display = "flex";
                document.getElementById("successText").textContent = "تم الدخول بنجاح - " + rbacUser.fullName;
                errorBox.style.display = "none";
                
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                return;
            }

            // فشل الدخول
            errorBox.style.display = "flex";
            document.getElementById("errorText").textContent = "بيانات الدخول غير صحيحة أو الحساب معطل";
            successBox.style.display = "none";
        }

        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });

        // ============================================================
        // ** التعديل الرئيسي: التحقق من صلاحية الجلسة قبل التوجيه **
        // ============================================================
        function checkSessionAndRedirect() {
            // إذا كان المستخدم قد سجل دخوله بالفعل ولديه جلسة صالحة
            if (localStorage.getItem('imci_logged_in') === 'true') {
                const session = JSON.parse(localStorage.getItem('imci_session'));
                
                if (session && session.loginTime) {
                    // التحقق من عدم انتهاء صلاحية الجلسة (8 ساعات)
                    const loginTime = new Date(session.loginTime);
                    const now = new Date();
                    const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
                    
                    if (hoursDiff <= 8) {
                        // الجلسة لا تزال صالحة، التوجيه إلى لوحة التحكم
                        window.location.href = 'dashboard.html';
                    } else {
                        // انتهت صلاحية الجلسة، تنظيف التخزين المحلي وعرض صفحة الدخول
                        localStorage.removeItem('imci_session');
                        localStorage.setItem('imci_logged_in', 'false');
                        console.log("انتهت صلاحية الجلسة. يرجى تسجيل الدخول مرة أخرى.");
                    }
                } else {
                    // الجلسة غير مكتملة، تنظيف التخزين المحلي
                    localStorage.removeItem('imci_session');
                    localStorage.setItem('imci_logged_in', 'false');
                }
            }
        }

        // تنفيذ التحقق عند تحميل الصفحة
        checkSessionAndRedirect();
    </script>

</body>
</html>
