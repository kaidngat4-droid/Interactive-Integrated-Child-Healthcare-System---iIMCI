<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحقق...</title>
    <style>
        body {
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Cairo', sans-serif;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // هذا الملف يعمل كـ "حارس بوابة" فقط.
        // وظيفته التحقق من حالة تسجيل الدخول وتوجيه المستخدم.

        (function() {
            // 1. التحقق من وجود جلسة صالحة بالنظام الجديد (PRO)
            const proSession = localStorage.getItem('pro_session');
            if (proSession) {
                try {
                    const session = JSON.parse(proSession);
                    if (session.expiresAt && session.expiresAt > Date.now()) {
                        // الجلسة صالحة، اذهب للوحة التحكم
                        window.location.replace('dashboard.html');
                        return;
                    } else {
                        // الجلسة منتهية، نظفها
                        localStorage.removeItem('pro_session');
                    }
                } catch (e) {
                    localStorage.removeItem('pro_session');
                }
            }

            // 2. التحقق من وجود جلسة قديمة جداً (للتوافق) وتحويلها
            const oldSession = localStorage.getItem('imci_logged_in');
            if (oldSession === 'true') {
                // تنظيف الجلسة القديمة لأن النظام الجديد هو المعتمد
                localStorage.removeItem('imci_logged_in');
                localStorage.removeItem('imci_user');
                localStorage.removeItem('imci_facility');
                // سيتم توجيهه لصفحة الدخول الجديدة لإعادة المصادقة
            }

            // 3. إذا لم تكن هناك جلسة صالحة، اذهب إلى صفحة تسجيل الدخول الجديدة
            window.location.replace('login.html');
        })();
    </script>
</body>
</html>
